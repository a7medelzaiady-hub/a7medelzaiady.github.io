<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>برنامج مبيعات حقيقي</title>

<style>
body {font-family: Arial; background:#f2f2f2; padding:20px;}
.box {background:white; padding:15px; margin-bottom:10px; border-radius:10px;}
input, button {padding:10px; margin:5px;}
table {width:100%; border-collapse:collapse; background:white;}
th, td {border:1px solid #ddd; padding:8px; text-align:center;}
.total {font-size:20px; font-weight:bold;}
</style>
</head>

<body>

<h2>📊 برنامج مبيعات حقيقي</h2>

<!-- منتجات -->
<div class="box">
<h3>➕ إضافة منتج</h3>
<input id="pname" placeholder="اسم المنتج">
<input id="pprice" placeholder="السعر">
<button onclick="addProduct()">إضافة</button>
</div>

<!-- جدول المنتجات -->
<div class="box">
<h3>📦 المنتجات</h3>
<table>
<thead>
<tr>
<th>الاسم</th>
<th>السعر</th>
<th>إضافة</th>
</tr>
</thead>
<tbody id="products"></tbody>
</table>
</div>

<!-- الفاتورة -->
<div class="box">
<h3>🧾 فاتورة جديدة</h3>
<ul id="bill"></ul>

<p class="total">الإجمالي: <span id="total">0</span></p>

<button onclick="saveBill()">💾 حفظ الفاتورة</button>
<button onclick="clearBill()">🗑 مسح</button>
</div>

<!-- سجل الفواتير -->
<div class="box">
<h3>📚 سجل الفواتير</h3>
<ul id="history"></ul>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let bills = JSON.parse(localStorage.getItem("bills")) || [];
let bill = [];

function addProduct(){
  let name = document.getElementById("pname").value;
  let price = Number(document.getElementById("pprice").value);

  products.push({name, price});
  localStorage.setItem("products", JSON.stringify(products));

  showProducts();
}

function showProducts(){
  let table = document.getElementById("products");
  table.innerHTML = "";

  products.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td><button onclick="addToBill(${i})">➕</button></td>
      </tr>
    `;
  });
}

function addToBill(i){
  bill.push(products[i]);
  showBill();
}

function showBill(){
  let list = document.getElementById("bill");
  let total = 0;
  list.innerHTML = "";

  bill.forEach((p,i)=>{
    list.innerHTML += `
      <li>${p.name} - ${p.price}
      <button onclick="removeItem(${i})">❌</button></li>
    `;
    total += p.price;
  });

  document.getElementById("total").innerText = total;
}

function removeItem(i){
  bill.splice(i,1);
  showBill();
}

function clearBill(){
  bill = [];
  showBill();
}

function saveBill(){
  if(bill.length === 0){ alert("الفاتورة فاضية"); return; }

  let total = bill.reduce((sum,p)=>sum+p.price,0);

  bills.push({
    date: new Date().toLocaleString(),
    items: bill,
    total: total
  });

  localStorage.setItem("bills", JSON.stringify(bills));
  bill = [];
  showBill();
  showHistory();

  alert("تم حفظ الفاتورة ✔");
}

function showHistory(){
  let list = document.getElementById("history");
  list.innerHTML = "";

  bills.forEach(b=>{
    list.innerHTML += `<li>${b.date} - ${b.total} جنيه</li>`;
  });
}

showProducts();
showHistory();

</script>

</body>
</html>
