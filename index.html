<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>برنامج المبيعات</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; padding:20px; }
    .box { background:white; padding:15px; margin-bottom:10px; border-radius:10px; }
    input, button { padding:10px; margin:5px; }
    table { width:100%; background:white; border-collapse:collapse; }
    th, td { border:1px solid #ddd; padding:8px; text-align:center; }
  </style>
</head>

<body>

<h2>📊 برنامج المبيعات</h2>

<div class="box">
  <h3>إضافة منتج</h3>
  <input id="name" placeholder="اسم المنتج">
  <input id="price" placeholder="السعر">
  <button onclick="addProduct()">إضافة</button>
</div>

<div class="box">
  <h3>المنتجات</h3>
  <table>
    <thead>
      <tr>
        <th>المنتج</th>
        <th>السعر</th>
        <th>إضافة فاتورة</th>
      </tr>
    </thead>
    <tbody id="products"></tbody>
  </table>
</div>

<div class="box">
  <h3>الفاتورة</h3>
  <ul id="bill"></ul>
  <h3>الإجمالي: <span id="total">0</span> جنيه</h3>
</div>

<script>
let products = [];
let bill = [];

function addProduct(){
  let name = document.getElementById("name").value;
  let price = Number(document.getElementById("price").value);

  products.push({name, price});
  showProducts();
}

function showProducts(){
  let table = document.getElementById("products");
  table.innerHTML = "";

  products.forEach((p, i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td><button onclick="addToBill(${i})">+</button></td>
      </tr>
    `;
  });
}

function addToBill(i){
  bill.push(products[i]);
  showBill();
}

function showBill(){
  let list = document.getElementById("bill");
  let total = 0;
  list.innerHTML = "";

  bill.forEach(p=>{
    list.innerHTML += `<li>${p.name} - ${p.price}</li>`;
    total += p.price;
  });

  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
