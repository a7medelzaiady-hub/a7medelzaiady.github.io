<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام المبيعات</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

/* شريط علوي */
.header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* كروت */
.card{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* input */
input, select{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

/* زرار */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

/* جدول */
table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

/* إجمالي */
.total{
  font-size:18px;
  font-weight:bold;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">📊 نظام المبيعات</div>

<div class="card">
<h3>👤 اسم العميل</h3>
<input id="customer" placeholder="اسم العميل">
</div>

<div class="card">
<h3>➕ إضافة صنف</h3>

<input id="item" placeholder="اسم الصنف">
<input id="qty" placeholder="العدد">
<input id="price" placeholder="السعر">

<select id="type">
<option>قطعة</option>
<option>كرتونة</option>
</select>

<button onclick="addSale()">إضافة</button>
</div>

<div class="card">
<h3>🧾 الفاتورة</h3>

<table>
<thead>
<tr>
<th>الصنف</th>
<th>عدد</th>
<th>سعر</th>
<th>إجمالي</th>
</tr>
</thead>
<tbody id="sales"></tbody>
</table>

<div class="total">الإجمالي: <span id="total">0</span> جنيه</div>
</div>

<script>

let sales=[];

function addSale(){
  let item=document.getElementById("item").value;
  let qty=Number(document.getElementById("qty").value);
  let price=Number(document.getElementById("price").value);

  let total=qty*price;

  sales.push({item,qty,price,total});
  show();
}

function show(){
  let table=document.getElementById("sales");
  let totalAll=0;
  table.innerHTML="";

  sales.forEach(s=>{
    table.innerHTML+=`
      <tr>
        <td>${s.item}</td>
        <td>${s.qty}</td>
        <td>${s.price}</td>
        <td>${s.total}</td>
      </tr>
    `;
    totalAll+=s.total;
  });

  document.getElementById("total").innerText=totalAll;
}

</script>

</body>
</html>
