<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق المبيعات</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#eef2f7;
}

/* Header */
header{
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* Card */
.card{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Inputs */
input, select{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

/* Button */
button{
  width:100%;
  padding:12px;
  background:#1976d2;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

/* Total */
.total{
  font-size:20px;
  font-weight:bold;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<header>📱 تطبيق المبيعات</header>

<div class="card">
<h3>👤 العميل</h3>
<input id="customer" placeholder="اسم العميل">
</div>

<div class="card">
<h3>➕ إضافة صنف</h3>

<input id="item" placeholder="اسم الصنف">
<input id="qty" placeholder="العدد">
<input id="price" placeholder="السعر">

<select id="type">
<option>قطعة</option>
<option>كرتونة</option>
</select>

<button onclick="add()">إضافة</button>
</div>

<div class="card">
<h3>🧾 الفاتورة</h3>

<table>
<thead>
<tr>
<th>الصنف</th>
<th>عدد</th>
<th>سعر</th>
<th>إجمالي</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

<div class="total">الإجمالي: <span id="total">0</span> جنيه</div>
</div>

<script>

let data=[];

function add(){
  let item=document.getElementById("item").value;
  let qty=Number(document.getElementById("qty").value);
  let price=Number(document.getElementById("price").value);

  let total=qty*price;

  data.push({item,qty,price,total});
  show();
}

function show(){
  let table=document.getElementById("list");
  let sum=0;
  table.innerHTML="";

  data.forEach(d=>{
    table.innerHTML+=`
      <tr>
        <td>${d.item}</td>
        <td>${d.qty}</td>
        <td>${d.price}</td>
        <td>${d.total}</td>
      </tr>
    `;
    sum+=d.total;
  });

  document.getElementById("total").innerText=sum;
}

</script>

</body>
</html>
