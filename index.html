<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>نظام مبيعات ومشتريات</title>

<style>
body {font-family: Arial; background:#f2f2f2; padding:20px;}
.box {background:white; padding:15px; margin-bottom:10px; border-radius:10px;}
input, select, button {padding:10px; margin:5px;}
table {width:100%; border-collapse:collapse; background:white;}
th, td {border:1px solid #ddd; padding:8px; text-align:center;}
.total {font-size:20px; font-weight:bold;}
</style>

</head>

<body>

<h2>📊 نظام المبيعات والمشتريات</h2>

<!-- بيانات العميل -->
<div class="box">
<h3>👤 بيانات البيع</h3>
<input id="customer" placeholder="اسم العميل">
</div>

<!-- إضافة صنف -->
<div class="box">
<h3>➕ إضافة صنف</h3>

<input id="item" placeholder="اسم الصنف">
<input id="qty" placeholder="العدد">
<input id="price" placeholder="السعر">

<select id="type">
  <option value="قطعة">قطعة</option>
  <option value="كرتونة">كرتونة</option>
</select>

<button onclick="addSale()">إضافة</button>
</div>

<!-- جدول المبيعات -->
<div class="box">
<h3>🧾 الفاتورة</h3>

<table>
<thead>
<tr>
<th>الصنف</th>
<th>العدد</th>
<th>السعر</th>
<th>النوع</th>
<th>الإجمالي</th>
</tr>
</thead>

<tbody id="sales"></tbody>
</table>

<p class="total">الإجمالي الكلي: <span id="total">0</span> جنيه</p>
</div>

<!-- المشتريات -->
<div class="box">
<h3>🛒 المشتريات (نفس النظام)</h3>

<input id="bitem" placeholder="الصنف">
<input id="bqty" placeholder="العدد">
<input id="bprice" placeholder="السعر">

<select id="btype">
  <option value="قطعة">قطعة</option>
  <option value="كرتونة">كرتونة</option>
</select>

<button onclick="addBuy()">إضافة مشتريات</button>

<ul id="buyList"></ul>
</div>

<script>

let sales = [];
let buys = [];

function addSale(){
  let item = document.getElementById("item").value;
  let qty = Number(document.getElementById("qty").value);
  let price = Number(document.getElementById("price").value);
  let type = document.getElementById("type").value;

  let total = qty * price;

  sales.push({item, qty, price, type, total});
  showSales();
}

function showSales(){
  let table = document.getElementById("sales");
  let totalAll = 0;
  table.innerHTML = "";

  sales.forEach(s=>{
    table.innerHTML += `
      <tr>
        <td>${s.item}</td>
        <td>${s.qty}</td>
        <td>${s.price}</td>
        <td>${s.type}</td>
        <td>${s.total}</td>
      </tr>
    `;
    totalAll += s.total;
  });

  document.getElementById("total").innerText = totalAll;
}

function addBuy(){
  let item = document.getElementById("bitem").value;
  let qty = Number(document.getElementById("bqty").value);
  let price = Number(document.getElementById("bprice").value);
  let type = document.getElementById("btype").value;

  let total = qty * price;

  buys.push({item, qty, price, type, total});
  showBuys();
}

function showBuys(){
  let list = document.getElementById("buyList");
  list.innerHTML = "";

  buys.forEach(b=>{
    list.innerHTML += `<li>${b.item} - ${b.qty} - ${b.price} - ${b.type} - ${b.total}</li>`;
  });
}

</script>

</body>
</html>
