<!DOCTYPE html>
<html> 
  <head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة كامل</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f4f6f9;
}

/* Header */
header{
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
}

/* Menu */
.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}

/* Pages */
.page{
  display:none;
  padding:15px;
}

input,button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  background:#1976d2;
  color:white;
  border:none;
}

.back{
  background:#555;
}
</style>
</head>

<body>

<header>🏢 نظام إدارة الشركة</header>

<!-- الرئيسية -->
<div id="home">

<div class="menu">

<div class="card" onclick="openPage('sales')">📊 مبيعات</div>
<div class="card" onclick="openPage('buy')">🛒 مشتريات</div>
<div class="card" onclick="openPage('clients')">👤 عملاء</div>
<div class="card" onclick="openPage('suppliers')">🚚 موردين</div>
<div class="card" onclick="openPage('stock')">📦 مخزن</div>
<div class="card" onclick="openPage('cash')">💰 صندوق</div>
<div class="card" onclick="openPage('reports')">📈 تقارير</div>

</div>

</div>

<!-- مبيعات -->
<div class="page" id="sales">
<h3>📊 المبيعات</h3>

<input placeholder="اسم الصنف">
<input placeholder="العدد">
<input placeholder="السعر">

<button>إضافة بيع</button>
<button class="back" onclick="back()">رجوع</button>
</div>

<!-- مشتريات -->
<div class="page" id="buy">
<h3>🛒 المشتريات</h3>
<input placeholder="اسم الصنف">
<input placeholder="العدد">
<input placeholder="السعر">

<button>إضافة شراء</button>
<button class="back" onclick="back()">رجوع</button>
</div>

<!-- عملاء -->
<div class="page" id="clients">
<h3>👤 العملاء</h3>
<input placeholder="اسم العميل">
<input placeholder="رقم الهاتف">

<button>إضافة عميل</button>
<button class="back" onclick="back()">رجوع</button>
</div>

<!-- موردين -->
<div class="page" id="suppliers">
<h3>🚚 الموردين</h3>
<input placeholder="اسم المورد">
<input placeholder="رقم الهاتف">

<button>إضافة مورد</button>
<button class="back" onclick="back()">رجوع</button>
</div>

<!-- مخزن -->
<div class="page" id="stock">
<h3>📦 المخزن</h3>
<input placeholder="اسم الصنف">
<input placeholder="الكمية">

<button>إضافة للمخزن</button>
<button class="back" onclick="back()">رجوع</button>
</div>

<!-- صندوق -->
<div class="page" id="cash">
<h3>💰 الصندوق</h3>
<p>الرصيد الحالي: 0 جنيه</p>
<button class="back" onclick="back()">رجوع</button>
</div>

<!-- تقارير -->
<div class="page" id="reports">
<h3>📈 التقارير</h3>
<p>هنا هيتعرض تقرير المبيعات والأرباح</p>
<button class="back" onclick="back()">رجوع</button>
</div>

<script>

function openPage(id){
  document.getElementById("home").style.display="none";
  document.getElementById(id).style.display="block";
}

function back(){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById("home").style.display="block";
}

</script>

</body>
</html>
